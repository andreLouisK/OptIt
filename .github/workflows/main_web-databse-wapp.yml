name: Build and deploy Node.js app to Azure Web App - Web-Databse-WAPP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4 # Oppdatert fra v3 til v4
        with:
          node-version: '24.x'

      - name: npm install and build
        run: |
          npm install
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .
          if-no-files-found: error
          retention-days: 1
  deploy:
    runs-on: ubuntu-latest
    needs: build
    # --- LEGG TIL DISSE LINJENE HER ---
    permissions:
      id-token: write
      contents: read
    # ----------------------------------
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3EBA02CA257C4019831027B5039AB386 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C8B22910B75946B39673B3CBC6A0F41C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AA3EB19859254F7DA69586FCE54C8DA4 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Web-Databse-WAPP'
          # slot-name er fjernet her – nå treffer den riktig!
          package: .
